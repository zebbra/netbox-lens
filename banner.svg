<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2b138" stop-opacity="0.22"/>
      <stop offset="68%" stop-color="#f2b138" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2b138"/>
      <stop offset="28%" stop-color="#f2b138"/>
      <stop offset="60%" stop-color="#f2b138" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#14161b"/>

  <!-- Dot grid texture -->
  <rect width="1280" height="320" fill="url(#dotGrid)" opacity="0.5"/>

  <!-- Top accent hairline -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#topAccent)"/>

  <!-- Logo glow -->
  <ellipse cx="175" cy="160" rx="120" ry="120" fill="url(#glow)"/>

  <!-- Logo mark (aperture) -->
  <g transform="translate(175,160)">
    <!-- Outer ring -->
    <circle r="94" stroke="#f2b138" stroke-width="2" fill="none"/>
    <!-- Inner ring -->
    <circle r="72" stroke="#f2b138" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
    <!-- Hexagonal aperture -->
    <polygon points="0,-38 32.9,-19 32.9,19 0,38 -32.9,19 -32.9,-19"
             stroke="#f2b138" stroke-width="2" stroke-linejoin="round" fill="none"
             transform="scale(2)"/>
    <!-- Aperture blades -->
    <line x1="0" y1="-76" x2="44.3" y2="-93.3" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
    <line x1="65.9" y1="-38" x2="71.3" y2="10" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
    <line x1="65.9" y1="38" x2="26.9" y2="66.8" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
    <line x1="0" y1="76" x2="-44.3" y2="56.7" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
    <line x1="-65.9" y1="38" x2="-71.3" y2="-10" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
    <line x1="-65.9" y1="-38" x2="-26.9" y2="-66.8" stroke="#f2b138" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.85"/>
  </g>

  <!-- Text block -->
  <!-- Label: NetBox Plugin · Endpoint Lookup -->
  <text x="335" y="124"
        font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="13" font-weight="500" letter-spacing="3.5"
        fill="#f2b138" text-anchor="start">
    NetBox Plugin  ·  Endpoint Lookup
  </text>

  <!-- LENS -->
  <text x="330" y="228"
        font-family="'Space Grotesk', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="104" font-weight="700" letter-spacing="2"
        fill="#f4f5f7" text-anchor="start">LENS</text>

  <!-- Tagline with highlighted first letters -->
  <text x="335" y="272"
        font-family="'Space Grotesk', Arial, sans-serif"
        font-size="27" font-weight="400" letter-spacing="0.2"
        fill="#9aa1ad" text-anchor="start">
    <tspan font-weight="500" fill="#f4f5f7">L</tspan>ocate <tspan font-weight="500" fill="#f4f5f7">E</tspan>ndpoints across <tspan font-weight="500" fill="#f4f5f7">N</tspan>etwork <tspan font-weight="500" fill="#f4f5f7">S</tspan>ystems
  </text>

  <!-- Subline -->
  <text x="335" y="302"
        font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="14" fill="#5d6470" text-anchor="start">
    Unified endpoint lookup across multiple network backends
  </text>
</svg>
