x-netdisco-env: &netdisco-env
  NETDISCO_DOMAIN: discover
  NETDISCO_DB_HOST: netdisco-postgresql
  NETDISCO_CURRENT_PG_VERSION: "18"

x-netdisco-volumes: &netdisco-volumes
  - /home/sgr/code/netdisco-docker/netdisco/config:/home/netdisco/environments
  - /home/sgr/code/netdisco-docker/netdisco/nd-site-local:/home/netdisco/nd-site-local
  - /home/sgr/code/netdisco-docker/netdisco/logs:/home/netdisco/logs

x-dns-opt: &dns-opt
  - "ndots:0"
  - "timeout:1"
  - "retries:0"
  - "attempts:1"
  - edns0
  - trustad

services:

  # ── Netdisco ──────────────────────────────────────────────────────────────

  netdisco-postgresql:
    image: netdisco/netdisco:latest-postgresql
    container_name: lens-netdisco-postgresql
    shm_size: 128mb
    volumes:
      - /home/sgr/code/netdisco-docker/netdisco/postgresql:/var/lib/postgresql
    environment: *netdisco-env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netdisco"]
      interval: 5s
      timeout: 3s
      retries: 10

  netdisco-db-init:
    image: quay.io/stefan_grosser/netdisco:feature-combined-5967d5be-backend
    container_name: lens-netdisco-db-init
    entrypoint: ""
    command: "/home/netdisco/bin/netdisco-env /home/netdisco/bin/netdisco-updatedb.sh"
    user: postgres
    depends_on:
      netdisco-postgresql:
        condition: service_healthy
    volumes:
      - /home/sgr/code/netdisco-docker/netdisco/postgresql:/var/lib/pgversions/new
      - /home/sgr/code/netdisco-docker/netdisco/config:/home/netdisco/environments
      - /home/sgr/code/netdisco-docker/netdisco/nd-site-local:/home/netdisco/nd-site-local
      - /home/sgr/code/netdisco-docker/netdisco/logs:/home/netdisco/logs
    environment:
      <<: *netdisco-env
      DEPLOY_ADMIN_USER: "YES"

  netdisco-backend:
    image: quay.io/stefan_grosser/netdisco:feature-combined-5967d5be-backend
    container_name: lens-netdisco-backend
    depends_on:
      netdisco-db-init:
        condition: service_completed_successfully
    init: true
    volumes: *netdisco-volumes
    environment: *netdisco-env
    dns_opt: *dns-opt

  netdisco-web:
    image: quay.io/stefan_grosser/netdisco:feature-combined-5967d5be-web
    container_name: lens-netdisco-web
    depends_on:
      netdisco-db-init:
        condition: service_completed_successfully
    init: true
    ports:
      - "5001:5000"
    volumes: *netdisco-volumes
    environment:
      <<: *netdisco-env
      IPV: "4"
    dns_opt: *dns-opt

  # ── NetBox ────────────────────────────────────────────────────────────────

  netbox:
    image: ghcr.io/netbox-community/netbox:v4.4.7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8080"
    env_file: netbox.env
    volumes:
      - ../:/opt/netbox/netbox-lens:ro
      - ./configuration.py:/etc/netbox/config/plugins.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    command: >-
      sh -c "uv pip install -q --python /opt/netbox/venv/bin/python /opt/netbox/netbox-lens &&
             exec /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"

  netbox-worker:
    image: ghcr.io/netbox-community/netbox:v4.4.7
    restart: on-failure
    depends_on:
      netbox:
        condition: service_healthy
    env_file: netbox.env
    volumes:
      - ../:/opt/netbox/netbox-lens:ro
      - ./configuration.py:/etc/netbox/config/plugins.py:ro
    command: >-
      sh -c "uv pip install -q --python /opt/netbox/venv/bin/python /opt/netbox/netbox-lens &&
             exec /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine

volumes:
  postgres-data:
